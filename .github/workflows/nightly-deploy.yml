name: Nightly Deployment

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPO_BACKEND: ${{ secrets.ECR_REPO_BACKEND }}
  ECR_REPO_FRONTEND: ${{ secrets.ECR_REPO_FRONTEND }}
  EC2_SECURITY_GROUP: ${{ secrets.EC2_SECURITY_GROUP }}
  EC2_SUBNET: ${{ secrets.EC2_SUBNET }}
  EC2_KEY_NAME: ${{ secrets.EC2_KEY_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout infra repo
      uses: actions/checkout@v3

    - name: Clone application repo
      run: |
        git clone https://github.com/aailsaa/spa-app.git

    - name: Show directory structure
      run: |
        ls -la
        ls -la spa-app

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Build Docker Images

    - name: Build Docker images
      run: |
        bash scripts/build-image.sh

    # Create temporary EC2 for testing

    - name: Launch temporary EC2
      run: |
        INSTANCE_ID=$(aws ec2 run-instances \
          --image-id ami-0c02fb55956c7d316 \
          --instance-type t2.micro \
          --security-group-ids $EC2_SECURITY_GROUP \
          --subnet-id $EC2_SUBNET \
          --key-name $EC2_KEY_NAME \
          --query 'Instances[0].InstanceId' \
          --output text)

        echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

        echo "Waiting for instance..."

        aws ec2 wait instance-running --instance-ids $INSTANCE_ID

        EC2_IP=$(aws ec2 describe-instances \
          --instance-ids $INSTANCE_ID \
          --query 'Reservations[0].Instances[0].PublicIpAddress' \
          --output text)

        echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV

        echo "Temporary EC2 IP: $EC2_IP"

    # Install Docker on EC2

    - name: Install Docker on EC2
      run: |
        sleep 30

        ssh -o StrictHostKeyChecking=no ec2-user@$EC2_IP << 'EOF'
        sudo yum update -y
        sudo yum install -y docker
        sudo systemctl start docker
        sudo systemctl enable docker
        EOF

    # Copy and run containers on EC2

    - name: Run containers on EC2
      run: |
        docker save spa-backend | gzip > backend.tar.gz
        docker save spa-frontend | gzip > frontend.tar.gz

        scp -o StrictHostKeyChecking=no backend.tar.gz ec2-user@$EC2_IP:~
        scp -o StrictHostKeyChecking=no frontend.tar.gz ec2-user@$EC2_IP:~

        ssh -o StrictHostKeyChecking=no ec2-user@$EC2_IP << 'EOF'
        gunzip backend.tar.gz
        gunzip frontend.tar.gz

        docker load < backend.tar
        docker load < frontend.tar

        docker run -d -p 8080:8080 spa-backend
        docker run -d -p 3000:3000 spa-frontend
        EOF

    # Smoke test

    - name: Smoke test
      run: |

        echo "Waiting for backend..."

        for i in {1..20}; do
          if curl -s http://$EC2_IP:8080 > /dev/null; then
            echo "Backend is up!"
            break
          fi

          echo "Waiting..."
          sleep 5
        done

        curl http://$EC2_IP:8080

    # Destroy temporary EC2

    - name: Terminate temporary EC2
      if: always()
      run: |
        aws ec2 terminate-instances --instance-ids $INSTANCE_ID

    # Push images to ECR

    - name: Push images to ECR
      run: |
        bash scripts/push-ecr.sh

    # Deploy to QA EC2

    - name: Deploy to QA EC2
      run: |
        bash scripts/deploy-qa.sh
